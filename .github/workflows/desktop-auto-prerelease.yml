name: Desktop Auto Pre-Release

on:
  schedule:
    - cron: "20 */12 * * *"
  workflow_dispatch:

concurrency:
  group: desktop-auto-prerelease-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: write

jobs:
  check-for-new-commits:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      reason: ${{ steps.check.outputs.reason }}
    steps:
      - name: Check whether this workflow has new commits to build
        id: check
        uses: actions/github-script@v7
        env:
          WORKFLOW_REF: ${{ github.workflow_ref }}
        with:
          script: |
            if (context.eventName !== "schedule") {
              core.setOutput("should_build", "true");
              core.setOutput("reason", `Run requested by ${context.eventName}.`);
              core.info("Manual or non-scheduled run detected, build will proceed.");
              return;
            }

            const workflowRef = process.env.WORKFLOW_REF || "";
            const workflowFile = workflowRef.split("/.github/workflows/")[1]?.split("@")[0];
            if (!workflowFile) {
              throw new Error(`Unable to resolve workflow file from ${workflowRef}`);
            }

            const { owner, repo } = context.repo;
            const branch = context.payload.repository.default_branch;
            const runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
              owner,
              repo,
              workflow_id: workflowFile,
              branch,
              status: "completed",
              per_page: 100,
            });

            const previousRun = runs[0];
            if (!previousRun) {
              core.setOutput("should_build", "true");
              core.setOutput("reason", "No previous completed build was found.");
              core.info("No previous completed build was found, build will proceed.");
              return;
            }

            const shouldBuild = previousRun.head_sha !== context.sha;
            const reason = shouldBuild
              ? `New commit detected: ${context.sha} (previous completed run: ${previousRun.head_sha}).`
              : `No new commits since previous completed run: ${previousRun.head_sha}.`;

            core.setOutput("should_build", shouldBuild ? "true" : "false");
            core.setOutput("reason", reason);
            core.info(reason);

  build-and-publish:
    needs: check-for-new-commits
    if: needs.check-for-new-commits.outputs.should_build == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            platform: windows-latest
            args: ""
          - name: macos-x64
            platform: macos-latest
            args: --target x86_64-apple-darwin
          - name: macos-arm64
            platform: macos-latest
            args: --target aarch64-apple-darwin
          - name: linux-x64
            platform: ubuntu-22.04
            args: --bundles appimage,deb,rpm
          - name: linux-arm64
            platform: ubuntu-22.04-arm
            args: --bundles deb,rpm

    runs-on: ${{ matrix.platform }}
    name: build-${{ matrix.name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: startsWith(matrix.platform, 'ubuntu-22.04')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev librsvg2-dev patchelf rpm
          if apt-cache show libayatana-appindicator3-dev > /dev/null 2>&1; then
            sudo apt-get install -y libayatana-appindicator3-dev
          else
            sudo apt-get install -y libappindicator3-dev
          fi

      - name: Install Rust toolchain (default target)
        if: matrix.platform != 'macos-latest'
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust toolchain (macOS cross targets)
        if: matrix.platform == 'macos-latest'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend assets
        run: pnpm run web:build

      - name: Setup macOS signing and notarization
        if: matrix.platform == 'macos-latest'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: ./scripts/ci/setup-macos-signing.sh

      - name: Build and upload desktop pre-release
        uses: tauri-apps/tauri-action@v0.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_API_ISSUER: ${{ matrix.platform == 'macos-latest' && secrets.APPLE_API_ISSUER || '' }}
          APPLE_API_KEY: ${{ matrix.platform == 'macos-latest' && secrets.APPLE_API_KEY || '' }}
        with:
          tagName: desktop-auto-v__VERSION__
          releaseName: TauriTavern 桌面端自动构建（安装版 + 便携版）v__VERSION__ / TauriTavern Desktop Auto Build (Installer + Portable) v__VERSION__
          releaseBody: |
            ## 桌面端自动构建（预发布）
            这是由 GitHub Actions 自动构建的桌面客户端预发布版本，仅用于测试和体验，不代表稳定正式版。
            本 release 包含适合各平台的桌面分发产物：Windows / macOS / Linux 安装包，以及适合的便携版产物。
            来源提交：${{ github.sha }}

            ## Desktop Auto Build (Pre-release)
            This is an automatically built desktop client pre-release generated by GitHub Actions.
            It is intended for testing and preview only, and is not a stable production release.
            This release includes platform-appropriate desktop artifacts: installers for Windows / macOS / Linux, plus portable artifacts where that distribution model makes sense.
            Source commit: ${{ github.sha }}
          releaseDraft: false
          prerelease: true
          args: ${{ matrix.args }}

  build-and-publish-portable:
    needs: check-for-new-commits
    if: needs.check-for-new-commits.outputs.should_build == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            platform: windows-latest
            args: ""
          - name: linux-x64
            platform: ubuntu-22.04
            args: ""
          - name: linux-arm64
            platform: ubuntu-22.04-arm
            args: ""

    runs-on: ${{ matrix.platform }}
    name: build-portable-${{ matrix.name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: startsWith(matrix.platform, 'ubuntu-22.04')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev librsvg2-dev patchelf rpm
          if apt-cache show libayatana-appindicator3-dev > /dev/null 2>&1; then
            sudo apt-get install -y libayatana-appindicator3-dev
          else
            sudo apt-get install -y libappindicator3-dev
          fi

      - name: Install Rust toolchain (default target)
        if: matrix.platform != 'macos-latest'
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust toolchain (macOS cross targets)
        if: matrix.platform == 'macos-latest'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend assets
        run: pnpm run web:build

      - name: Build and upload desktop portable pre-release
        uses: tauri-apps/tauri-action@v0.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: desktop-auto-v__VERSION__
          releaseName: TauriTavern 桌面端自动构建（安装版 + 便携版）v__VERSION__ / TauriTavern Desktop Auto Build (Installer + Portable) v__VERSION__
          releaseBody: |
            ## 桌面端自动构建（预发布）
            这是由 GitHub Actions 自动构建的桌面客户端预发布版本，仅用于测试和体验，不代表稳定正式版。
            本 release 包含适合各平台的桌面分发产物：Windows / macOS / Linux 安装包，以及适合的便携版产物。
            来源提交：${{ github.sha }}

            ## Desktop Auto Build (Pre-release)
            This is an automatically built desktop client pre-release generated by GitHub Actions.
            It is intended for testing and preview only, and is not a stable production release.
            This release includes platform-appropriate desktop artifacts: installers for Windows / macOS / Linux, plus portable artifacts where that distribution model makes sense.
            Source commit: ${{ github.sha }}
          releaseDraft: false
          prerelease: true
          includeUpdaterJson: false
          args: ${{ matrix.args }} --no-bundle --features portable
          uploadPlainBinary: true
          assetNamePattern: '[name]-[version]-[platform]-[arch]-portable[ext]'

  skip-build:
    needs: check-for-new-commits
    if: needs.check-for-new-commits.outputs.should_build != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Skip build because no new commit was found
        run: echo "${{ needs.check-for-new-commits.outputs.reason }}"
